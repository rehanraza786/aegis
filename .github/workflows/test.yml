name: test
# AEGIS self-test suite: both editions × linux + windows.
# Copy .github-workflows/ to .github/workflows/ when pushing to GitHub.
on:
  push: { branches: ["**"] }
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        runtime: [node, python]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Run suite
        run: python tests/run_tests.py --runtime ${{ matrix.runtime }}
