<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src data:; style-src 'unsafe-inline'; script-src 'nonce-__NONCE__';">
<title>AEGIS Graph</title>
<style>
  :root { color-scheme: light dark; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--vscode-font-family); font-size: var(--vscode-font-size, 13px);
    color: var(--vscode-foreground); background: var(--vscode-editor-background);
    display: grid; grid-template-rows: auto 1fr; grid-template-columns: 1fr 340px;
    grid-template-areas: "bar bar" "graph side"; overflow: hidden;
  }
  #bar { grid-area: bar; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
         padding: 6px 10px; border-bottom: 1px solid var(--vscode-panel-border); }
  #bar .title { font-weight: 600; margin-right: 6px; }
  #search { width: 200px; flex: none; }
  #results { display: none; position: absolute; top: 34px; left: 96px; z-index: 20; width: 320px;
             max-height: 320px; overflow-y: auto; background: var(--vscode-notifications-background, #252526);
             border: 1px solid var(--vscode-panel-border); border-radius: 4px; box-shadow: 0 4px 16px rgba(0,0,0,.4); }
  #results.on { display: block; }
  #results .item { padding: 5px 9px; cursor: pointer; display: flex; gap: 7px; align-items: baseline; }
  #results .item.active, #results .item:hover { background: var(--vscode-button-secondaryBackground, #3a3d41); }
  #results .item .tag { flex: none; }
  #bar label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; opacity: .9; white-space: nowrap; }
  #bar .spacer { flex: 1; }
  #bar .meta { opacity: .7; font-size: .92em; }
  button {
    font-family: inherit; font-size: inherit; cursor: pointer;
    color: var(--vscode-button-foreground); background: var(--vscode-button-background);
    border: 1px solid transparent; border-radius: 3px; padding: 3px 10px;
  }
  button.secondary { color: var(--vscode-button-secondaryForeground); background: var(--vscode-button-secondaryBackground); }
  button:hover { filter: brightness(1.1); }
  #cy { grid-area: graph; min-width: 0; min-height: 0; }
  #side { grid-area: side; border-left: 1px solid var(--vscode-panel-border); overflow-y: auto; padding: 10px 12px; }
  #side h3 { margin: 4px 0 8px; font-size: 1em; }
  #side h4 { margin: 12px 0 4px; font-size: .95em; opacity: .85; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: .9em; opacity: .85; margin: 2px 0 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .sw { width: 11px; height: 11px; display: inline-block; border-radius: 3px; }
  .sw.diamond { transform: rotate(45deg) scale(.85); border-radius: 2px; }
  .sw.round { border-radius: 50%; }
  .site { display: flex; gap: 6px; align-items: baseline; margin: 2px 0; }
  .site a { color: var(--vscode-textLink-foreground); cursor: pointer; text-decoration: none;
            font-family: var(--vscode-editor-font-family, monospace); font-size: .92em; word-break: break-all; }
  .site a:hover { text-decoration: underline; }
  .tag { font-size: .78em; border: 1px solid var(--vscode-panel-border); border-radius: 3px; padding: 0 4px; opacity: .8; }
  .warn { color: var(--vscode-editorWarning-foreground, #cca700); }
  .err  { color: var(--vscode-editorError-foreground, #f14c4c); }
  .muted { opacity: .65; }
  .gap-item { border: 1px solid var(--vscode-panel-border); border-radius: 4px; padding: 6px 8px; margin: 6px 0; }
  .gap-item .actions { margin-top: 4px; display: flex; gap: 6px; }
  form.annotate { margin-top: 8px; display: grid; gap: 6px; }
  textarea, input, select {
    font-family: inherit; font-size: inherit; color: var(--vscode-input-foreground);
    background: var(--vscode-input-background); border: 1px solid var(--vscode-input-border, transparent);
    border-radius: 3px; padding: 4px 6px; width: 100%; box-sizing: border-box;
  }
  textarea { resize: vertical; min-height: 54px; }
  .hint { font-size: .85em; opacity: .7; }
  .toast { position: fixed; bottom: 12px; left: 12px; right: 372px; padding: 8px 12px; border-radius: 4px;
           background: var(--vscode-notifications-background, #333); border: 1px solid var(--vscode-panel-border);
           box-shadow: 0 2px 8px rgba(0,0,0,.35); display: none; }
  #stale { display: none; position: absolute; top: 44px; left: 50%; transform: translateX(-50%); z-index: 5;
           align-items: center; gap: 10px; padding: 6px 12px; border-radius: 4px; font-size: .92em;
           background: var(--vscode-notifications-background, #333);
           border: 1px solid var(--vscode-editorWarning-foreground, #cca700);
           box-shadow: 0 2px 8px rgba(0,0,0,.35); }
  #stale.on { display: inline-flex; }
</style>
</head>
<body>
  <div id="bar">
    <span class="title">AEGIS Graph</span>
    <input id="search" type="search" placeholder="Search nodes ( / )" autocomplete="off">
    <label><input type="checkbox" id="tTopics" checked> Topics</label>
    <label><input type="checkbox" id="tTables" checked> Tables</label>
    <label><input type="checkbox" id="tEndpoints" checked> Endpoints</label>
    <label><input type="checkbox" id="tTests"> Test-only items</label>
    <span class="spacer"></span>
    <span class="meta" id="meta"></span>
    <button class="secondary" id="relayout" title="Recompute the layout (deterministic)">Layout</button>
    <button class="secondary" id="fit">Fit (f)</button>
    <button id="refresh">Refresh (r)</button>
  </div>
  <div id="results"></div>
  <div id="cy"></div>
  <div id="stale"><span class="warn">⚠ Index is stale</span><span class="muted" id="staleDetail"></span>
    <button id="staleReindex">Reindex</button></div>
  <div id="side">
    <div class="legend" id="legend"></div>
    <div id="details"><h3>Details</h3><p class="muted">Click a node. Modules are rectangles, Kafka topics are
      diamonds, DB tables are barrels. Dashed border = asserted (derived, not parsed). ⚠ = warning.
      Right side lists <b>gaps</b>: places the graph needs a human.</p></div>
    <div id="asserts"></div>
    <div id="gaps"></div>
  </div>
  <div class="toast" id="toast"></div>

<script nonce="__NONCE__" src="__CYTOSCAPE__"></script>
<script nonce="__NONCE__">
const vscode = acquireVsCodeApi();
let G = null, cy = null, selected = null;

/* VS Code's own chart palette adapts to the active theme (light AND dark).
   Identity is never color-alone: node SHAPE + text label carry the type. */
const cssVar = (n, fb) => (getComputedStyle(document.body).getPropertyValue(n) || fb).trim() || fb;
const C = () => ({
  module: cssVar("--vscode-charts-blue", "#3794ff"),
  topic:  cssVar("--vscode-charts-yellow", "#cca700"),
  table:  cssVar("--vscode-charts-purple", "#b180d7"),
  endpoint: cssVar("--vscode-charts-green", "#89d185"),
  warn:   cssVar("--vscode-editorWarning-foreground", "#cca700"),
  err:    cssVar("--vscode-editorError-foreground", "#f14c4c"),
  ink:    cssVar("--vscode-foreground", "#ccc"),
  line:   cssVar("--vscode-panel-border", "#555"),
  bg:     cssVar("--vscode-editor-background", "#1e1e1e"),
});

const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const toast = (msg, isErr) => {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  t.style.borderColor = isErr ? C().err : C().line;
  clearTimeout(t._h); t._h = setTimeout(() => { t.style.display = "none"; }, 6000);
};

/* Deterministic pseudo-random position from the node id: fresh layouts start
   from the same seed every time (cose runs randomize:false on top), and nodes
   that appear later (e.g. enabling a layer) land somewhere stable instead of
   stacking at 0,0. Same id → same spot, forever. */
function hashPos(id) {
  let h1 = 0x811c9dc5, h2 = 0x1000193;
  for (let i = 0; i < id.length; i++) { h1 = ((h1 ^ id.charCodeAt(i)) * 16777619) >>> 0; h2 = ((h2 * 31) + id.charCodeAt(i)) >>> 0; }
  return { x: 120 + (h1 % 1000), y: 80 + (h2 % 620) };
}

function elements() {
  const showTopics = tTopics.checked, showTables = tTables.checked, showTests = tTests.checked;
  const showEndpoints = tEndpoints.checked;
  const els = [], modIds = new Set(G.modules.map((m) => m.id));
  const modOf = (p) => p.split("/")[0];
  for (const m of G.modules) {
    els.push({ data: { id: "m:" + m.id, label: m.id, type: "module", ref: m } });
  }
  for (const m of G.modules) for (const d of m.deps) {
    if (modIds.has(d)) els.push({ data: { id: `dep:${m.id}:${d}`, source: "m:" + m.id, target: "m:" + d, type: "dep" } });
  }
  if (showTopics) for (const t of G.topics) {
    const warn = Object.keys(t.warnings || {}).length > 0;
    const testOnly = t.warnings && t.warnings.test_only;
    if (testOnly && !showTests) continue;
    els.push({ data: { id: "t:" + t.topic, label: (warn ? "⚠ " : "") + t.topic, type: "topic", warn, testOnly, ref: t } });
    const seen = new Set();
    const link = (sites, dir) => (sites.items || []).forEach((s) => {
      const mod = modOf(s.path); if (!modIds.has(mod)) return;
      const id = `${dir}:${t.topic}:${mod}`; if (seen.has(id)) return; seen.add(id);
      els.push({ data: { id, type: dir, asserted: !!s.asserted,
        source: dir === "produce" ? "m:" + mod : "t:" + t.topic,
        target: dir === "produce" ? "t:" + t.topic : "m:" + mod, label: dir === "produce" ? "publish" : "consume" } });
    });
    link(t.producers, "produce"); link(t.consumers, "consume");
    if (showTests && t.test_sites) (t.test_sites.items || []).forEach((s) => {
      const mod = modOf(s.path); if (!modIds.has(mod)) return;
      const id = `test:${t.topic}:${mod}:${s.line}`;
      els.push({ data: { id, type: "testedge", source: "m:" + mod, target: "t:" + t.topic, label: "[TEST]" } });
    });
  }
  if (showTables) for (const t of G.tables) {
    const warn = Object.keys(t.warnings || {}).length > 0;
    els.push({ data: { id: "d:" + t.table, label: (warn ? "⚠ " : "") + t.table, type: "table", warn, ref: t } });
    const seen = new Set();
    (t.access.items || []).forEach((s) => {
      const mod = modOf(s.path); if (!modIds.has(mod)) return;
      const id = `acc:${t.table}:${mod}:${s.mode}`; if (seen.has(id)) return; seen.add(id);
      els.push({ data: { id, source: "m:" + mod, target: "d:" + t.table, type: "access", asserted: !!s.asserted, label: s.mode } });
    });
  }
  if (showEndpoints) {
    const seenEp = new Set();
    for (const e of G.endpoints) {
      const id = `e:${e.method} ${e.path}`;
      if (seenEp.has(id)) continue; seenEp.add(id);
      const warn = Object.keys(e.warnings || {}).length > 0;
      els.push({ data: { id, label: (warn ? "⚠ " : "") + `${e.method} ${e.path}`, type: "endpoint", warn, ref: e } });
      const homeMod = modOf(e.file);
      if (modIds.has(homeMod)) {
        els.push({ data: { id: `srv:${id}`, source: "m:" + homeMod, target: id, type: "serve", label: "serves" } });
      }
      const seenCall = new Set();
      (e.callers.items || []).forEach((c) => {
        const mod = modOf(c.path); if (!modIds.has(mod) || mod === homeMod) return;
        const cid = `call:${id}:${mod}`; if (seenCall.has(cid)) return; seenCall.add(cid);
        els.push({ data: { id: cid, source: "m:" + mod, target: id, type: "httpcall", asserted: !!c.asserted, label: "calls" } });
      });
    }
  }
  // every node gets a deterministic seed position (see hashPos)
  for (const el of els) if (!el.data.source) el.position = hashPos(el.data.id);
  return els;
}

function style() {
  const c = C();
  return [
    { selector: "node", style: { label: "data(label)", color: c.ink, "font-size": 11,
        "text-valign": "center", "text-halign": "center", "text-wrap": "wrap", "text-max-width": 110,
        "border-width": 1.5, "border-color": c.line } },
    { selector: 'node[type="module"]', style: { shape: "round-rectangle", width: 120, height: 34,
        "background-color": c.module, "background-opacity": .22, "border-color": c.module } },
    { selector: 'node[type="topic"]', style: { shape: "diamond", width: 96, height: 52,
        "background-color": c.topic, "background-opacity": .2, "border-color": c.topic, "font-size": 10 } },
    { selector: 'node[type="table"]', style: { shape: "barrel", width: 96, height: 40,
        "background-color": c.table, "background-opacity": .2, "border-color": c.table, "font-size": 10 } },
    { selector: 'node[type="endpoint"]', style: { shape: "round-tag", width: 120, height: 30,
        "background-color": c.endpoint, "background-opacity": .18, "border-color": c.endpoint,
        "font-size": 9, "text-max-width": 140 } },
    { selector: "node[?warn]", style: { "border-color": c.warn, "border-width": 2.5 } },
    { selector: "node[?testOnly]", style: { opacity: .45 } },
    { selector: "node:selected", style: { "border-width": 3, "overlay-opacity": .08 } },
    { selector: "edge", style: { width: 1.4, "line-color": c.line, "target-arrow-color": c.line,
        "target-arrow-shape": "triangle", "arrow-scale": .8, "curve-style": "bezier",
        label: "data(label)", "font-size": 8.5, color: c.ink, "text-opacity": .75,
        "text-background-color": c.bg, "text-background-opacity": .85, "text-background-padding": 1 } },
    { selector: 'edge[type="produce"], edge[type="consume"]', style: { "line-color": c.topic, "target-arrow-color": c.topic, "line-opacity": .7 } },
    { selector: 'edge[type="access"]', style: { "line-color": c.table, "target-arrow-color": c.table, "line-opacity": .7 } },
    { selector: 'edge[type="testedge"]', style: { "line-style": "dotted", opacity: .4 } },
    { selector: 'edge[type="serve"], edge[type="httpcall"]', style: { "line-color": c.endpoint, "target-arrow-color": c.endpoint, "line-opacity": .65 } },
    { selector: "edge[?asserted]", style: { "line-style": "dashed" } },
    // focus mode: everything outside the selected neighborhood recedes
    { selector: ".dim", style: { opacity: .13, "text-opacity": .1 } },
    // label level-of-detail: edge labels appear past a zoom threshold (or on selection)
    { selector: "edge.lod-hidden", style: { "text-opacity": 0 } },
    { selector: "edge.lod-hidden:selected", style: { "text-opacity": .8 } },
  ];
}

let savedState = null;   // extension-provided workspace state: { positions, zoom, pan }
let restoredView = false; // zoom/pan restored once per panel lifetime
function focusOn(n) {
  cy.elements().addClass("dim");
  n.closedNeighborhood().removeClass("dim");
}
function unfocus() { if (cy) cy.elements().removeClass("dim"); }
let persistT = null;
function schedulePersist() {
  clearTimeout(persistT);
  persistT = setTimeout(() => {
    if (!cy) return;
    vscode.postMessage({ type: "persist", state: {
      positions: Object.fromEntries(cy.nodes().map((n) => [n.id(), n.position()])),
      zoom: cy.zoom(), pan: cy.pan(),
    } });
  }, 800);
}
let lodShown = null;
function updateLod() {
  const show = cy.zoom() >= 0.75;
  if (show === lodShown) return;
  lodShown = show;
  cy.edges()[show ? "removeClass" : "addClass"]("lod-hidden");
}

function render(keepPositions, freshLayout) {
  const live = keepPositions && cy ? Object.fromEntries(cy.nodes().map((n) => [n.id(), n.position()])) : null;
  const stored = !freshLayout && !live && savedState?.positions ? savedState.positions : null;
  if (cy) cy.destroy();
  const preset = live || stored;
  cy = cytoscape({ container: document.getElementById("cy"), elements: elements(), style: style(),
    // priority: live positions (toggles/refreshes never rearrange the map) →
    // stored positions (the map survives closing the panel) → deterministic
    // cose from hashPos seeds (randomize:false), so even a fresh layout is
    // the same layout every time
    layout: preset ? { name: "preset", positions: (n) => preset[n.id()] || hashPos(n.id()) }
                   : { name: "cose", animate: false, randomize: false, nodeRepulsion: 90000, idealEdgeLength: 110,
                       padding: 24, nodeDimensionsIncludeLabels: true, nodeOverlap: 24, componentSpacing: 120 },
    wheelSensitivity: .2 });
  window._cy = cy; // debug/test hook (the container div already owns window.cy)
  cy.on("tap", "node", (ev) => { selected = ev.target.data(); showDetails(selected); focusOn(ev.target); });
  cy.on("tap", (ev) => { if (ev.target === cy) { selected = null; resetDetails(); unfocus(); } });
  // LOD is deferred to the next frame: toggling classes synchronously INSIDE
  // the zoom event re-enters the renderer mid-viewport-change and can crash
  // the webview's Chromium (reproduced headless; rAF-deferred it cannot)
  cy.on("zoom", () => requestAnimationFrame(updateLod));
  cy.on("layoutstop dragfree pan zoom", schedulePersist);
  if (!restoredView && stored && savedState.zoom) {
    cy.viewport({ zoom: savedState.zoom, pan: savedState.pan });
  }
  restoredView = true;
  lodShown = null;
  updateLod();
  const c = C();
  document.getElementById("legend").innerHTML =
    `<span><span class="sw" style="background:${c.module}"></span>module</span>` +
    `<span><span class="sw diamond" style="background:${c.topic}"></span>Kafka topic</span>` +
    `<span><span class="sw round" style="background:${c.table}"></span>DB table</span>` +
    `<span><span class="sw" style="background:${c.endpoint}"></span>endpoint</span>` +
    `<span><span class="warn">⚠ warning</span></span><span class="muted">dashed = asserted</span>`;
  // "shown/total" whenever the export capped a list — silent truncation reads
  // as "covered everything" when it didn't
  const gf = G.generated_from;
  const cnt = (shown, total) => (total && total > shown ? `${shown}/${total}` : `${shown}`);
  document.getElementById("meta").textContent =
    `${cnt(G.modules.length, gf.modules_total)} modules · ${cnt(G.topics.length, gf.topics_total)} topics · ` +
    `${cnt(G.tables.length, gf.tables_total)} tables · ${cnt(G.endpoints.length, gf.endpoints_total)} endpoints · ${gf.symbols} symbols`;
  // stale-index banner: the graph must be able to say it's out of date
  const stale = document.getElementById("stale");
  if (gf.fresh === false) {
    document.getElementById("staleDetail").textContent =
      `indexed ${String(gf.indexed_sha || "?").slice(0, 8)} · HEAD ${String(gf.head_sha || "?").slice(0, 8)}`;
    stale.classList.add("on");
  } else {
    stale.classList.remove("on");
  }
}

const siteRow = (s, extra = "") =>
  `<div class="site"><a data-open="${esc(s.path)}:${s.line}">${esc(s.path)}:${s.line}</a>` +
  `<a data-cite="${esc(s.path)}:${s.line}" title="Cite this line as evidence">⎘</a>` +
  (s.via ? `<span class="tag">via ${esc(s.via)}</span>` : "") +
  (s.test ? `<span class="tag">TEST</span>` : "") +
  (s.asserted ? `<span class="tag">${esc(s.asserted)}</span>` : "") + extra + "</div>";
const moreRow = (l) => l.more ? `<div class="muted">…and ${l.more} more (query the tool)</div>` : "";

function noteForm(target, kind) {
  return `<form class="annotate" data-note="${esc(target)}" data-kind="${kind}">
    <textarea name="summary" placeholder="What should agents know about ${esc(target)}? (≥40 chars — served via explain/context_pack, provenance: human)"></textarea>
    <button type="submit">Save note to graph</button></form>`;
}

function showDetails(d) {
  const el = document.getElementById("details");
  if (d.type === "module") {
    const m = d.ref;
    const notes = (G.annotations.insights || []).filter((i) => i.target === m.id);
    el.innerHTML = `<h3>${esc(m.id)} <span class="tag">module</span></h3>
      <div>${m.files} files · ${esc((m.langs || []).join(", "))}</div>
      ${m.deps.length ? `<h4>Depends on</h4>${m.deps.map((x) => `<div class="site">${esc(x)}</div>`).join("")}` : ""}
      ${notes.length ? `<h4>Notes in graph</h4>${notes.map((n) => `<div class="gap-item"><span class="tag">${esc(n.by || "")}</span> ${esc(n.summary || `${n.kind} note`)}</div>`).join("")}` : ""}
      <h4>Annotate</h4>${noteForm(m.id, "module")}`;
  } else if (d.type === "topic") {
    const t = d.ref;
    const w = t.warnings || {};
    el.innerHTML = `<h3>${esc(t.topic)} <span class="tag">topic</span></h3>
      ${w.orphan_produce ? `<div class="warn">⚠ produced but no consumer found</div>` : ""}
      ${w.orphan_consume ? `<div class="warn">⚠ consumed but no producer found</div>` : ""}
      ${w.test_only ? `<div class="warn">⚠ only exercised by tests</div>` : ""}
      ${w.unresolved_expression ? `<div class="err">⚠ contains an unresolved runtime expression (see Gaps)</div>` : ""}
      ${t.system ? `<div class="muted">system: ${esc(t.system)}</div>` : ""}
      ${t.config_keys ? `<div class="muted">declared in config: ${t.config_keys.map(esc).join(", ")}</div>` : ""}
      <h4>Producers</h4>${(t.producers.items || []).map((s) => siteRow(s)).join("") || '<div class="muted">none</div>'}${moreRow(t.producers)}
      <h4>Consumers</h4>${(t.consumers.items || []).map((s) => siteRow(s)).join("") || '<div class="muted">none</div>'}${moreRow(t.consumers)}
      ${t.test_sites ? `<h4>Test usage</h4>${(t.test_sites.items || []).map((s) => siteRow(s)).join("")}` : ""}
      <h4>Annotate</h4>${noteForm(t.topic, "topic")}
      ${(() => {
        const anchor = (t.producers.items || [])[0] || (t.consumers.items || [])[0];
        return anchor ? `<h4>Assert a missing producer/consumer</h4>
        <form class="annotate" data-assert='${esc(JSON.stringify({ kind: "kafka", topic: t.topic, file: anchor.path, line: anchor.line }))}'>
          <select name="direction"><option>produce</option><option>consume</option></select>
          <textarea name="evidence" placeholder="Evidence (≥20 chars): quote the code that convinced you"></textarea>
          <select name="confidence"><option>high</option><option selected>medium</option><option>low</option></select>
          <button type="submit">Assert into graph</button>
          <div class="hint">Anchored to ${esc(anchor.path)}:${anchor.line} — git-versioned, provenance “human”.</div>
        </form>` : "";
      })()}`;
  } else if (d.type === "table") {
    const t = d.ref;
    const w = t.warnings || {};
    const first = (t.access.items || [])[0];
    el.innerHTML = `<h3>${esc(t.table)} <span class="tag">table</span></h3>
      ${w.drift_no_changeset ? `<div class="err">⚠ DRIFT: accessed by code but no changeset defines it</div>` : ""}
      ${w.defined_but_unused ? `<div class="warn">⚠ defined in changelog but no code access found</div>` : ""}
      ${t.changesets.length ? `<h4>Schema history</h4><div>${t.changesets.map(esc).join(" → ")}</div>` : ""}
      <h4>Access</h4>${(t.access.items || []).map((s) => siteRow(s, ` <span class="tag">${esc(s.mode || "")}</span>`)).join("") || '<div class="muted">none</div>'}${moreRow(t.access)}
      ${w.drift_no_changeset && first ? `<h4>Assert (close this gap with evidence)</h4>
        <form class="annotate" data-assert='${esc(JSON.stringify({ kind: "db", table: t.table, file: first.path, line: first.line, mode: first.mode || "rw" }))}'>
          <textarea name="evidence" placeholder="Evidence (≥20 chars): quote the code/changelog that convinced you"></textarea>
          <select name="confidence"><option>high</option><option selected>medium</option><option>low</option></select>
          <button type="submit">Assert into graph</button>
          <div class="hint">Writes docs/graph-assertions.json — git-versioned, PR-reviewed, provenance “human”.</div>
        </form>` : ""}
      <h4>Annotate</h4>${noteForm(t.table, "table")}`;
  } else if (d.type === "endpoint") {
    const e = d.ref;
    const w = e.warnings || {};
    el.innerHTML = `<h3>${esc(e.method)} ${esc(e.path)} <span class="tag">endpoint</span></h3>
      ${e.asserted ? `<div class="muted">provenance: ${esc(e.asserted)}</div>` : ""}
      ${w.no_caller ? `<div class="warn">⚠ no production caller found${w.tested_only ? " (exercised only by tests)" : ""}</div>` : ""}
      <h4>Defined at</h4><div class="site"><a data-open="${esc(e.file)}:${e.line}">${esc(e.file)}:${e.line}</a></div>
      <h4>Callers</h4>${(e.callers.items || []).map((s) => siteRow(s, s.client ? ` <span class="tag">${esc(s.client)}</span>` : "")).join("") || '<div class="muted">none</div>'}${moreRow(e.callers)}`;
  }
  bindDetailHandlers(el);
}

function resetDetails() {
  document.getElementById("details").innerHTML = `<h3>Details</h3><p class="muted">Click a node.</p>`;
}

/* The assertions panel: every human/agent-derived fact in the graph, with its
   lifecycle. STALE ones (evidence file changed since) float to the top as a
   re-verification worklist — a stale assertion IS a gap. Re-affirm moves its
   source_hash to the file's current hash; Retract removes it. Both write
   docs/graph-assertions.json through annotate, then auto-reindex. */
function renderAssertions() {
  const el = document.getElementById("asserts");
  const list = (G.annotations && G.annotations.assertions) || [];
  if (!list.length) { el.innerHTML = ""; return; }
  const stale = list.filter((x) => x.stale);
  const current = list.filter((x) => !x.stale);
  const row = (x) => `<div class="gap-item">
      ${x.stale ? `<span class="err">STALE</span> ` : ""}<b>${esc(x.kind)}</b> ${esc(x.topic || x.table || x.path || "")}
      ${x.direction ? `<span class="tag">${esc(x.direction)}</span>` : ""}
      <span class="tag">${esc(x.confidence || "")}</span><span class="tag">${esc(x.author || "")}</span>
      <div class="site"><a data-open="${esc(x.file)}:${x.line || 1}">${esc(x.file)}:${x.line || 1}</a></div>
      ${x.evidence ? `<div class="muted">“${esc(x.evidence)}”</div>` : ""}
      <div class="actions">
        ${x.stale ? `<button data-act="reaffirm" data-a="${esc(JSON.stringify(x))}">Re-affirm (evidence still holds)</button>` : ""}
        <button class="secondary" data-act="retract" data-a="${esc(JSON.stringify(x))}">Retract</button>
      </div></div>`;
  el.innerHTML = `<h3>Assertions in the graph (${list.length})</h3>
    ${stale.length ? `<h4 class="err">Stale — the evidence file changed, re-verify</h4>` + stale.map(row).join("") : ""}
    ${current.length ? `<h4>Current</h4>` + current.map(row).join("") : ""}`;
  el.querySelectorAll("button[data-act]").forEach((b) => b.addEventListener("click", () => {
    const x = JSON.parse(b.dataset.a);
    b.disabled = true;
    vscode.postMessage({ type: "annotate", payload: { action: b.dataset.act, kind: x.kind,
      file: x.file, line: x.line || 0, topic: x.topic, table: x.table, path: x.path } });
  }));
  bindDetailHandlers(el);
}

/* dismissed gaps mute with their audit trail; live ones offer a one-line
   dismissal (reason mandatory) through the same reviewed write path */
function dismissRow(d, gap, key) {
  if (d) return `<div class="muted">dismissed by ${esc(d.by || "?")}: ${esc(d.reason || "")}</div>`;
  return `<form class="annotate" data-dismiss='${esc(JSON.stringify({ gap, key }))}'>
    <input name="reason" placeholder="Dismiss with reason (≥10 chars — stays auditable)">
    <button type="submit" class="secondary">Dismiss</button></form>`;
}

function renderGaps() {
  renderAssertions();
  const g = document.getElementById("gaps");
  const items = (G.gaps.unresolved_topic_expressions || []);
  const declUnused = (G.gaps.topics_declared_in_config_but_unused || []);
  const orphans = G.topics.filter((t) => t.warnings && (t.warnings.orphan_produce || t.warnings.orphan_consume));
  const drift = G.tables.filter((t) => t.warnings && t.warnings.drift_no_changeset);
  const uncalled = G.endpoints.filter((e) => e.warnings && e.warnings.no_caller);
  g.innerHTML = `<h3>Gaps — the graph needs a human (${items.length + drift.length + declUnused.length})</h3>
    ${items.map((it, i) => `<div class="gap-item">
      <div class="err">unresolved: <b>${esc(it.expression)}</b> (${esc(it.direction)})</div>
      <div class="site"><a data-open="${esc(it.path)}:${it.line}">${esc(it.path)}:${it.line}</a></div>
      <form class="annotate" data-assert='${esc(JSON.stringify({ kind: "kafka", file: it.path, line: it.line, direction: it.direction }))}'>
        <input name="topic" placeholder="Resolved topic name" value="${esc(it.expression.replace(/\{\?\}/g, ""))}">
        <textarea name="evidence" placeholder="Evidence (≥20 chars): how did you resolve it? Quote the constant/config/profile."></textarea>
        <select name="confidence"><option>high</option><option selected>medium</option><option>low</option></select>
        <button type="submit">Assert resolved topic</button></form></div>`).join("")}
    ${declUnused.length ? `<h4 class="warn">Declared in config, unused</h4>` + declUnused.map((it) => `<div class="gap-item${it.dismissed ? " muted" : ""}"><span class="warn">⚠</span> <b>${esc(it.topic)}</b> — ${esc(it.config_key)} declares it, but no producer or consumer references it.<div class="site"><a data-open="${esc(it.path)}:${it.line}">${esc(it.path)}:${it.line}</a></div>${dismissRow(it.dismissed, "declared_unused", it.topic)}</div>`).join("") : ""}
    ${drift.length ? `<h4 class="err">Drift tables</h4>` + drift.map((t) => `<div class="gap-item"><span class="err">⚠</span> <b>${esc(t.table)}</b> — no changeset. Click its node to assert.</div>`).join("") : ""}
    ${orphans.length ? `<h4 class="warn">Orphan topics</h4>` + orphans.map((t) => `<div class="gap-item${t.dismissed ? " muted" : ""}"><span class="warn">⚠</span> <b>${esc(t.topic)}</b> — ${t.warnings.orphan_produce ? "no consumer" : "no producer"} found. Often a real bug: investigate before silencing.${dismissRow(t.dismissed, "orphan_topic", t.topic)}</div>`).join("") : ""}
    ${uncalled.length ? `<h4 class="warn">Endpoints with no caller</h4>` + uncalled.slice(0, 10).map((e) => `<div class="gap-item"><span class="warn">⚠</span> ${esc(e.method)} <b>${esc(e.path)}</b><div class="site"><a data-open="${esc(e.file)}:${e.line}">${esc(e.file)}:${e.line}</a></div></div>`).join("") + (uncalled.length > 10 ? `<div class="muted">…and ${uncalled.length - 10} more uncalled endpoints (query http_map)</div>` : "") : ""}`;
  bindDetailHandlers(g);
}

let citeBox = null; // the evidence textarea nearest the clicked cite link
function bindDetailHandlers(root) {
  root.querySelectorAll("a[data-open]").forEach((a) => a.addEventListener("click", () => {
    const [p, l] = a.dataset.open.split(/:(?=\d+$)/);
    vscode.postMessage({ type: "openFile", path: p, line: Number(l) || 1 });
  }));
  // cite-this-line: better evidence with one click — the extension reads the
  // line and it lands, quoted with its file:line, in the nearest evidence box
  root.querySelectorAll("a[data-cite]").forEach((a) => a.addEventListener("click", () => {
    const [p, l] = a.dataset.cite.split(/:(?=\d+$)/);
    const scope = a.closest(".gap-item") || root;
    citeBox = scope.querySelector("form.annotate textarea[name=evidence]") ||
      document.querySelector("#details form.annotate textarea[name=evidence]");
    vscode.postMessage({ type: "cite", path: p, line: Number(l) || 1 });
  }));
  root.querySelectorAll("form.annotate").forEach((f) => f.addEventListener("submit", (ev) => {
    ev.preventDefault();
    const fd = new FormData(f);
    if (f.dataset.dismiss) {
      const reason = (fd.get("reason") || "").toString().trim();
      if (reason.length < 10) { toast("Give a reason (≥10 chars) — dismissals stay auditable.", true); return; }
      vscode.postMessage({ type: "annotate", payload: { action: "dismiss", ...JSON.parse(f.dataset.dismiss), reason } });
    } else if (f.dataset.note) {
      const summary = (fd.get("summary") || "").toString().trim();
      if (summary.length < 40) { toast("Note must be at least 40 characters, write something an agent can use.", true); return; }
      vscode.postMessage({ type: "annotate", payload: { action: "insight", target: f.dataset.note, kind: f.dataset.kind, summary } });
    } else if (f.dataset.assert) {
      const base = JSON.parse(f.dataset.assert);
      const evidence = (fd.get("evidence") || "").toString().trim();
      if (evidence.length < 20) { toast("Evidence must be at least 20 characters, quote the code that convinced you.", true); return; }
      const payload = { action: "assert", ...base, evidence, confidence: (fd.get("confidence") || "medium").toString() };
      if (fd.get("topic")) payload.topic = fd.get("topic").toString().trim();
      if (fd.get("direction")) payload.direction = fd.get("direction").toString();
      vscode.postMessage({ type: "annotate", payload });
    }
  }));
}

let endpointsInit = false;
window.addEventListener("message", (ev) => {
  const m = ev.data;
  if (m.type === "data") {
    G = m.graph;
    if (m.saved) savedState = m.saved;
    if (!endpointsInit) {
      // sane default: draw the endpoints layer unless it would wallpaper the map
      tEndpoints.checked = (G.endpoints || []).length <= 60;
      endpointsInit = true;
    }
    render(m.keepPositions); renderGaps();
    // selection survives a refresh: re-resolve the node in the NEW graph and
    // re-render its (possibly changed) details, instead of dropping to blank
    if (selected) {
      const n = cy.getElementById(selected.id);
      if (n && n.nonempty()) { n.select(); selected = n.data(); showDetails(selected); focusOn(n); }
      else { selected = null; resetDetails(); }
    }
  }
  if (m.type === "toast") toast(m.message, m.isError);
  if (m.type === "citation" && citeBox) {
    citeBox.value = (citeBox.value ? citeBox.value + "\n" : "") + m.text;
    citeBox.focus();
  }
});
document.getElementById("refresh").addEventListener("click", () => vscode.postMessage({ type: "refresh" }));
document.getElementById("staleReindex").addEventListener("click", () => {
  toast("Reindexing (incremental)…");
  vscode.postMessage({ type: "reindex" });
});
document.getElementById("fit").addEventListener("click", () => cy && cy.fit(undefined, 30));
document.getElementById("relayout").addEventListener("click", () => { render(false, true); renderGaps(); schedulePersist(); });
// layer toggles keep every node where it was — spatial memory is the point
for (const id of ["tTopics", "tTables", "tEndpoints", "tTests"]) {
  document.getElementById(id).addEventListener("change", () => { render(true); renderGaps(); });
}

/* ---- search: fuzzy jump over modules/topics/tables/endpoints. `/` focuses,
   arrows navigate, Enter selects + animates + focuses the neighborhood. The
   result list is real DOM — the accessible twin of the canvas. ---- */
const searchEl = document.getElementById("search");
const resultsEl = document.getElementById("results");
let sItems = [];
let sActive = 0;
function searchIndex() {
  const out = [];
  for (const m of G.modules) out.push({ id: "m:" + m.id, label: m.id, kind: "module" });
  for (const t of G.topics) out.push({ id: "t:" + t.topic, label: t.topic, kind: "topic" });
  for (const t of G.tables) out.push({ id: "d:" + t.table, label: t.table, kind: "table" });
  const seen = new Set();
  for (const e of G.endpoints) {
    const id = `e:${e.method} ${e.path}`;
    if (!seen.has(id)) { seen.add(id); out.push({ id, label: `${e.method} ${e.path}`, kind: "endpoint" }); }
  }
  return out;
}
function runSearch() {
  const qy = searchEl.value.trim().toLowerCase();
  if (!qy || !G) { resultsEl.classList.remove("on"); sItems = []; return; }
  sItems = searchIndex().map((it) => {
    const l = it.label.toLowerCase();
    return { ...it, s: l === qy ? 3 : l.startsWith(qy) ? 2 : l.includes(qy) ? 1 : 0 };
  }).filter((it) => it.s > 0).sort((a, b) => b.s - a.s || a.label.length - b.label.length).slice(0, 12);
  sActive = 0;
  resultsEl.innerHTML = sItems.map((it, i) =>
    `<div class="item${i === 0 ? " active" : ""}" data-i="${i}" role="option"><span class="tag">${it.kind}</span><span>${esc(it.label)}</span></div>`).join("")
    || `<div class="item muted">no matches</div>`;
  resultsEl.classList.add("on");
  resultsEl.querySelectorAll(".item[data-i]").forEach((d) => d.addEventListener("click", () => jumpTo(sItems[Number(d.dataset.i)])));
}
function jumpTo(it) {
  if (!it || !cy) return;
  resultsEl.classList.remove("on");
  searchEl.blur();
  if (it.kind === "endpoint" && !tEndpoints.checked) { tEndpoints.checked = true; render(true); renderGaps(); }
  const n = cy.getElementById(it.id);
  if (!n || n.empty()) return;
  cy.animate({ fit: { eles: n.closedNeighborhood(), padding: 120 }, duration: 450, easing: "ease-in-out" });
  cy.$(":selected").unselect();
  n.select();
  selected = n.data();
  showDetails(selected);
  focusOn(n);
}
searchEl.addEventListener("input", runSearch);
searchEl.addEventListener("keydown", (ev) => {
  if (ev.key === "ArrowDown" || ev.key === "ArrowUp") {
    ev.preventDefault();
    if (!sItems.length) return;
    sActive = (sActive + (ev.key === "ArrowDown" ? 1 : sItems.length - 1)) % sItems.length;
    resultsEl.querySelectorAll(".item[data-i]").forEach((d, i) => d.classList.toggle("active", i === sActive));
  } else if (ev.key === "Enter") {
    jumpTo(sItems[sActive]);
  } else if (ev.key === "Escape") {
    resultsEl.classList.remove("on");
    searchEl.blur();
  }
});
document.addEventListener("keydown", (ev) => {
  // only TEXT-entry elements swallow shortcuts; a focused checkbox or button
  // (e.g. right after clicking a layer toggle) must not eat "/" or Escape
  const a = document.activeElement;
  const tag = a?.tagName || "";
  const inField = tag === "TEXTAREA" || tag === "SELECT" ||
    (tag === "INPUT" && !/^(checkbox|radio|button)$/.test(a.type || ""));
  if (inField) return;
  if (ev.key === "/") { ev.preventDefault(); searchEl.focus(); searchEl.select(); }
  else if (ev.key === "Escape") { selected = null; resetDetails(); unfocus(); if (cy) cy.$(":selected").unselect(); resultsEl.classList.remove("on"); }
  else if (ev.key === "f") { if (cy) cy.fit(undefined, 30); }
  else if (ev.key === "r") vscode.postMessage({ type: "refresh" });
});
vscode.postMessage({ type: "ready" });
</script>
</body>
</html>
